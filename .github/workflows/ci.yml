name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    name: Documentation checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node scripts/check-docs.mjs

  web:
    name: Web checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

  api:
    name: API checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21.x'
          cache-dependency-path: services/api/go.mod
      - name: Check formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "The following Go files need gofmt:"
            echo "$unformatted"
            exit 1
          fi
      - run: go vet ./...
      - run: go test ./...

  supabase:
    name: Supabase schema and RLS checks
    runs-on: ubuntu-latest
    env:
      # Placeholder local-only values avoid enabling a real third-party OAuth
      # integration in CI. The database tests do not exercise Google Auth.
      SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID: ci-local-google-client
      SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET: ci-local-google-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Start local Supabase
        run: npx --yes supabase@2.109.1 start
      - name: Lint schema
        run: npx --yes supabase@2.109.1 db lint --local --fail-on error
      - name: Run database tests
        run: npx --yes supabase@2.109.1 test db --local supabase/tests
      - name: Stop local Supabase
        if: always()
        run: npx --yes supabase@2.109.1 stop
